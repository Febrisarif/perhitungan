<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Skor Remi Pro | Statistik Kekalahan & Warna Khusus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c1320 0%, #070b12 100%);
            min-height: 100vh;
            padding: 1.2rem;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(145deg, #F7E5B5, #E7BC5E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            color: #8da3b5;
            font-size: 0.8rem;
        }

        .add-panel {
            background: rgba(25, 38, 48, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 0.8rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(231, 188, 94, 0.4);
        }
        .input-field {
            flex: 2;
            min-width: 150px;
        }
        .input-field label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #c9d9e8;
            font-weight: 600;
        }
        .input-field input {
            background: #101b24;
            border: 1px solid #3e5568;
            padding: 0.5rem 0.8rem;
            border-radius: 1.5rem;
            width: 100%;
            color: white;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(100deg, #e5b853, #d49f3a);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #1f2a33;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #f0c468;
        }

        .players-horizontal {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: flex-start;
        }

        .player-card {
            background: rgba(22, 34, 44, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 1.2rem;
            padding: 0.8rem;
            border: 1px solid rgba(229, 184, 83, 0.4);
            transition: 0.2s;
            width: 300px;
            min-width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .player-card:hover {
            border-color: #e5b853;
            background: #1e2f3b;
            transform: translateY(-3px);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 6px;
        }
        .player-name {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff1dd, #fad68f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        .action-icons {
            display: flex;
            gap: 5px;
        }
        .icon-btn {
            background: none;
            border: 1px solid;
            padding: 3px 8px;
            border-radius: 1.5rem;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }
        .icon-btn.delete {
            border-color: #ff9f7a;
            color: #ffbf9a;
        }
        .icon-btn.reset {
            border-color: #6c8faa;
            color: #c5def5;
        }
        .icon-btn:hover {
            background: #ffffff20;
        }

        .score-main {
            text-align: center;
            background: #07121b;
            border-radius: 1.2rem;
            padding: 0.5rem;
            margin: 0.5rem 0;
        }
        .score-value {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #fad974;
            line-height: 1;
        }
        .score-label {
            font-size: 0.6rem;
            color: #93afc2;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 8px 0;
            justify-content: center;
        }
        .q-btn {
            background: #1f3441;
            border: none;
            padding: 4px 8px;
            border-radius: 1.2rem;
            font-weight: 600;
            font-size: 0.7rem;
            color: #eef4fa;
            cursor: pointer;
            min-width: 45px;
            transition: 0.1s;
        }
        .q-btn.plus {
            background: #1f6a48;
            color: #c8ffb0;
        }
        .q-btn.plus:hover {
            background: #2c8c60;
        }
        .q-btn.minus {
            background: #9e4232;
            color: #ffcfb5;
        }
        .q-btn.minus:hover {
            background: #bc5543;
        }
        /* WARNA KUNING KHUSUS UNTUK +35, -35, +85, -85 */
        .q-btn.special-plus, .q-btn.special-minus {
            background: #d4a017;
            color: #fff5cc;
            border: 1px solid #ffdd77;
            box-shadow: 0 0 4px rgba(255,200,0,0.5);
        }
        .q-btn.special-plus:hover, .q-btn.special-minus:hover {
            background: #f0b820;
        }

        .custom-control {
            display: flex;
            gap: 4px;
            margin: 6px 0;
        }
        .custom-control input {
            background: #0c1821;
            border: 1px solid #5c7b94;
            padding: 4px 8px;
            border-radius: 1.2rem;
            color: white;
            width: 80px;
            font-size: 0.7rem;
            text-align: center;
        }
        .small-btn {
            background: #385f7a;
            border: none;
            padding: 4px 10px;
            border-radius: 1.2rem;
            font-weight: bold;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
        }

        /* Statistik Kekalahan */
        .stats-container {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(231, 188, 94, 0.3);
            text-align: center;
        }
        .stats-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            color: #7f9eb5;
            letter-spacing: 0.5px;
        }
        .stats-badge {
            font-size: 0.8rem;
            font-weight: 700;
            font-family: monospace;
            padding: 2px 6px;
            border-radius: 1.2rem;
            display: inline-block;
            margin-top: 3px;
            background: #2a2a3a;
            color: #ffaa88;
        }
        .loss-count {
            background: #5a1a1a;
            color: #ffaaaa;
            margin-left: 5px;
            padding: 2px 8px;
            border-radius: 1rem;
            font-size: 0.7rem;
        }

        .record-container {
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px solid rgba(231, 188, 94, 0.2);
            text-align: center;
        }
        .record-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            color: #7f9eb5;
            letter-spacing: 0.5px;
        }
        .record-badge {
            font-size: 0.85rem;
            font-weight: 700;
            font-family: monospace;
            padding: 2px 6px;
            border-radius: 1.2rem;
            display: inline-block;
            margin-top: 3px;
            background: #2a2a3a;
            color: #ffaa88;
        }

        .last-change-container {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(231, 188, 94, 0.2);
            text-align: center;
        }
        .last-change-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            color: #7f9eb5;
            letter-spacing: 0.5px;
        }
        .last-change-badge {
            font-size: 0.85rem;
            font-weight: 700;
            font-family: monospace;
            padding: 2px 6px;
            border-radius: 1.2rem;
            display: inline-block;
            margin-top: 3px;
        }
        .last-change-badge.positive {
            background: #1f6a4830;
            color: #adee8e;
            border: 1px solid #6fcb8a;
        }
        .last-change-badge.negative {
            background: #9e423230;
            color: #ffb48a;
            border: 1px solid #e07a5f;
        }
        .last-change-badge.neutral {
            background: #2a405030;
            color: #bbccdd;
        }

        .history-final-section {
            background: rgba(12, 22, 30, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            border: 1px solid rgba(231, 188, 94, 0.3);
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .history-container {
            padding: 0.8rem;
            border-bottom: 1px solid rgba(231, 188, 94, 0.2);
            max-height: 320px;
            overflow-y: auto;
        }
        .history-container h3 {
            color: #f5dfa5;
            font-size: 1rem;
            margin-bottom: 0.6rem;
            border-left: 3px solid #e5b853;
            padding-left: 10px;
        }
        .history-log {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            background: #0f1a21;
            border-radius: 0.8rem;
            padding: 0.4rem 0.7rem;
            font-size: 0.7rem;
            border-left: 2px solid;
        }
        .history-time {
            font-size: 0.55rem;
            color: #90a9bc;
        }
        .empty-log {
            color: #7f95aa;
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
        }

        .final-result-container {
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
        }
        .final-result-container h3 {
            color: #f5dfa5;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #e5b853;
            padding-left: 10px;
        }
        .final-scores-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: flex-start;
            align-items: center;
        }
        .final-score-item {
            background: #1a2a36;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            border: 1px solid rgba(229, 184, 83, 0.4);
            transition: 0.1s;
        }
        .final-player-name {
            font-weight: 700;
            color: #fad68f;
            font-size: 0.85rem;
        }
        .final-player-score {
            font-weight: 800;
            font-family: monospace;
            font-size: 1.1rem;
            background: #07121b;
            padding: 2px 8px;
            border-radius: 2rem;
        }
        .final-player-score.min-score {
            color: #ff6666;
            background: #2a0c0c;
            border: 1px solid #ff8888;
        }
        .final-player-score:not(.min-score) {
            color: #6fda6f;
            background: #0a2a0a;
            border: 1px solid #5fbf5f;
        }

        .tools-bar {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .btn-danger {
            background: #78281f;
            padding: 6px 16px;
            border: none;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .clear-history {
            background: #2c4b5e;
            border: none;
            border-radius: 2rem;
            padding: 6px 12px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }

        @media (max-width: 800px) {
            .player-card { width: 280px; min-width: 260px; }
            .score-value { font-size: 1.8rem; }
            .q-btn { padding: 3px 6px; min-width: 40px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🃏 SKOR REMI PRO 🃏</h1>
        <p>✨ +35, -35, +85, -85 = WARNA KUNING ✨ | Skor terendah MERAH, lainnya HIJAU</p>
        <p style="font-size:0.7rem;">📊 Setiap pemain: Rekor terkecil pribadi + Jumlah Kekalahan (berapa kali mencapai rekor terendah baru)</p>
    </div>

    <div class="add-panel">
        <div class="input-field">
            <label>NAMA PEMAIN</label>
            <input type="text" id="newPlayerName" placeholder="Contoh: Luffy, Zoro" autocomplete="off">
        </div>
        <div class="input-field">
            <label>SKOR AWAL</label>
            <input type="number" id="initialScore" value="0" step="5">
        </div>
        <button class="btn-primary" id="addPlayerBtn">➕ Tambah</button>
        <button class="btn-primary" id="sampleBtn" style="background:#3a5f7c;">♠️ Contoh</button>
    </div>

    <div id="playersContainer" class="players-horizontal"></div>

    <div class="history-final-section">
        <div class="history-container">
            <h3>📋 RIWAYAT SKOR</h3>
            <div id="historyLogContainer" class="history-log">
                <div class="empty-log">✨ Belum ada aktivitas.</div>
            </div>
        </div>

        <div class="final-result-container">
            <h3>🏆 HASIL AKHIR (SKOR TERKINI)</h3>
            <div id="finalScoresContainer" class="final-scores-grid">
                <div class="empty-log" style="padding:0.5rem;">Belum ada pemain</div>
            </div>
        </div>
    </div>

    <div class="tools-bar">
        <button class="btn-danger" id="resetAllBtn">🗑️ Reset Semua Pemain</button>
        <button class="clear-history" id="clearHistoryBtn">📜 Hapus Riwayat</button>
    </div>
</div>

<script>
    // ================= DATA =================
    // players: { id, name, score, lastDelta, minRecord, lossCount }
    // lossCount: jumlah kali pemain mencapai rekor terendah baru (kekalahan baru)
    let players = [];
    let globalHistory = [];

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
    }

    function saveToLocalStorage() {
        const data = { players, history: globalHistory };
        localStorage.setItem('remi_final_bawah', JSON.stringify(data));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('remi_final_bawah');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.players && Array.isArray(parsed.players)) {
                    players = parsed.players;
                    players.forEach(p => {
                        if (!p.id) p.id = generateId();
                        if (p.lastDelta === undefined) p.lastDelta = 0;
                        if (p.minRecord === undefined) p.minRecord = p.score;
                        if (p.lossCount === undefined) p.lossCount = 0;
                    });
                }
                if (parsed.history && Array.isArray(parsed.history)) globalHistory = parsed.history;
                else globalHistory = [];
            } catch(e) {}
        }
        if (!players) players = [];
        players.forEach(p => { 
            if (p.lastDelta === undefined) p.lastDelta = 0;
            if (p.minRecord === undefined) p.minRecord = p.score;
            if (p.lossCount === undefined) p.lossCount = 0;
        });
    }

    // Update rekor minimal dan jumlah kekalahan (lossCount)
    // Kekalahan dihitung setiap kali skor mencapai rekor terendah baru
    function updateMinRecordAndLoss(playerId, newScore) {
        const idx = players.findIndex(p => p.id === playerId);
        if (idx !== -1) {
            const currentMin = players[idx].minRecord;
            if (currentMin === undefined || newScore < currentMin) {
                players[idx].minRecord = newScore;
                // Tambah hitungan kekalahan (karena mencapai titik terendah baru)
                players[idx].lossCount = (players[idx].lossCount || 0) + 1;
                return true; // rekor baru
            }
        }
        return false;
    }

    function addHistoryAndUpdateDelta(playerId, playerName, delta, newScore) {
        const timestamp = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        globalHistory.unshift({ playerName, delta, newScore, timestamp });
        if (globalHistory.length > 150) globalHistory.pop();
        const idx = players.findIndex(p => p.id === playerId);
        if (idx !== -1) {
            players[idx].lastDelta = delta;
            const isNewRecord = updateMinRecordAndLoss(playerId, newScore);
            // Jika rekor baru, bisa tambahkan catatan di history? tidak wajib, cukup update lossCount
        }
        saveToLocalStorage();
        renderHistoryPanel();
        renderFinalScores();
        renderPlayersGrid();
    }

    function renderHistoryPanel() {
        const container = document.getElementById('historyLogContainer');
        if (!container) return;
        if (globalHistory.length === 0) {
            container.innerHTML = `<div class="empty-log">📭 Belum ada riwayat perubahan skor.</div>`;
            return;
        }
        container.innerHTML = '';
        for (let log of globalHistory.slice(0, 40)) {
            const div = document.createElement('div');
            div.className = 'history-item';
            const isPositive = log.delta >= 0;
            div.style.borderLeftColor = isPositive ? '#7bc46e' : '#f1956b';
            div.innerHTML = `
                <div class="history-time">🕒 ${log.timestamp}</div>
                <div><strong>${escapeHtml(log.playerName)}</strong> <span style="color:${isPositive ? '#b3f0a0' : '#ffb48a'}">${log.delta >= 0 ? '+' : ''}${log.delta}</span> → ${log.newScore}</div>
            `;
            container.appendChild(div);
        }
        if (globalHistory.length > 40) {
            const more = document.createElement('div');
            more.style.textAlign = 'center';
            more.style.fontSize = '0.65rem';
            more.style.color = '#99aabb';
            more.innerText = `+ ${globalHistory.length - 40} riwayat lainnya`;
            container.appendChild(more);
        }
    }

    function getMinScoreAmongAll() {
        if (players.length === 0) return null;
        let min = players[0].score;
        for (let i = 1; i < players.length; i++) {
            if (players[i].score < min) min = players[i].score;
        }
        return min;
    }

    function renderFinalScores() {
        const container = document.getElementById('finalScoresContainer');
        if (!container) return;
        if (players.length === 0) {
            container.innerHTML = `<div class="empty-log" style="padding:0.5rem;">Belum ada pemain</div>`;
            return;
        }
        
        const minScoreOverall = getMinScoreAmongAll();
        
        container.innerHTML = '';
        players.forEach(player => {
            const scoreItem = document.createElement('div');
            scoreItem.className = 'final-score-item';
            
            const scoreSpan = document.createElement('span');
            scoreSpan.className = 'final-player-score';
            scoreSpan.textContent = player.score;
            
            if (minScoreOverall !== null && player.score === minScoreOverall) {
                scoreSpan.classList.add('min-score');
            }
            
            scoreItem.innerHTML = `<span class="final-player-name">${escapeHtml(player.name)}</span>`;
            scoreItem.appendChild(scoreSpan);
            container.appendChild(scoreItem);
        });
    }

    function updatePlayerScore(playerId, deltaValue) {
        const idx = players.findIndex(p => p.id === playerId);
        if (idx === -1) return;
        const newScore = players[idx].score + deltaValue;
        players[idx].score = newScore;
        addHistoryAndUpdateDelta(playerId, players[idx].name, deltaValue, newScore);
        renderPlayersGrid();
    }

    function resetPlayerScoreToZero(playerId) {
        const idx = players.findIndex(p => p.id === playerId);
        if (idx === -1) return;
        const oldScore = players[idx].score;
        const delta = -oldScore;
        players[idx].score = 0;
        addHistoryAndUpdateDelta(playerId, players[idx].name, delta, 0);
        renderPlayersGrid();
    }

    function deletePlayerById(playerId) {
        const player = players.find(p => p.id === playerId);
        if (!player) return;
        if (confirm(`Hapus pemain "${player.name}"?`)) {
            players = players.filter(p => p.id !== playerId);
            renderPlayersGrid();
            renderFinalScores();
            saveToLocalStorage();
        }
    }

    function addPlayer(name, initialScore) {
        const trimmed = name.trim();
        if (trimmed === "") { alert("Nama tidak boleh kosong!"); return false; }
        const newId = generateId();
        const initial = Number(initialScore) || 0;
        const newPlayer = {
            id: newId,
            name: trimmed,
            score: initial,
            lastDelta: 0,
            minRecord: initial,
            lossCount: 0
        };
        players.push(newPlayer);
        if (initial !== 0) {
            addHistoryAndUpdateDelta(newId, trimmed, initial, initial);
        } else {
            renderPlayersGrid();
            renderFinalScores();
            saveToLocalStorage();
        }
        renderPlayersGrid();
        renderFinalScores();
        saveToLocalStorage();
        return true;
    }

    function resetAllPlayersAndHistory() {
        if (players.length === 0 && globalHistory.length === 0) return;
        if (confirm("⚠️ Hapus SEMUA pemain & seluruh riwayat?")) {
            players = [];
            globalHistory = [];
            saveToLocalStorage();
            renderPlayersGrid();
            renderHistoryPanel();
            renderFinalScores();
        }
    }

    function clearHistoryOnly() {
        if (globalHistory.length === 0) return;
        if (confirm("Hapus semua riwayat? Skor pemain & statistik kekalahan tetap ada.")) {
            globalHistory = [];
            saveToLocalStorage();
            renderHistoryPanel();
        }
    }

    const quickValues = [];
    for (let i = 5; i <= 100; i += 5) quickValues.push(i);
    // Angka khusus yang warnanya kuning: 35 dan 85
    const specialNumbers = [35, 85];

    function renderPlayersGrid() {
        const container = document.getElementById('playersContainer');
        if (!container) return;
        if (players.length === 0) {
            container.innerHTML = `<div style="background:rgba(0,0,0,0.3); border-radius:1.5rem; padding:2rem; text-align:center; color:#b0c4de; width:100%;">🎴 Belum ada pemain. Tambahkan pemain untuk mulai bermain remi.</div>`;
            return;
        }

        container.innerHTML = '';
        for (let player of players) {
            const card = document.createElement('div');
            card.className = 'player-card';

            const header = document.createElement('div');
            header.className = 'player-header';
            header.innerHTML = `
                <span class="player-name" title="${escapeHtml(player.name)}">${escapeHtml(player.name)}</span>
                <div class="action-icons">
                    <button class="icon-btn delete" data-id="${player.id}">🗑️</button>
                    <button class="icon-btn reset" data-id="${player.id}">↺0</button>
                </div>
            `;

            const scoreArea = document.createElement('div');
            scoreArea.className = 'score-main';
            scoreArea.innerHTML = `
                <div class="score-value">${player.score}</div>
                <div class="score-label">SKOR</div>
            `;

            const plusContainer = document.createElement('div');
            plusContainer.className = 'quick-buttons';
            const minusContainer = document.createElement('div');
            minusContainer.className = 'quick-buttons';
            
            quickValues.forEach(val => {
                const isSpecial = specialNumbers.includes(val);
                // Tombol PLUS
                const btnPlus = document.createElement('button');
                btnPlus.innerText = `+${val}`;
                btnPlus.className = 'q-btn plus';
                if (isSpecial) btnPlus.classList.add('special-plus');
                btnPlus.addEventListener('click', (e) => {
                    e.stopPropagation();
                    updatePlayerScore(player.id, val);
                });
                plusContainer.appendChild(btnPlus);
                
                // Tombol MINUS
                const btnMinus = document.createElement('button');
                btnMinus.innerText = `-${val}`;
                btnMinus.className = 'q-btn minus';
                if (isSpecial) btnMinus.classList.add('special-minus');
                btnMinus.addEventListener('click', (e) => {
                    e.stopPropagation();
                    updatePlayerScore(player.id, -val);
                });
                minusContainer.appendChild(btnMinus);
            });

            const customDiv = document.createElement('div');
            customDiv.className = 'custom-control';
            const customInput = document.createElement('input');
            customInput.type = 'number';
            customInput.placeholder = 'custom';
            customInput.value = '0';
            customInput.step = '5';
            const customBtn = document.createElement('button');
            customBtn.innerText = 'Ubah';
            customBtn.className = 'small-btn';
            customBtn.addEventListener('click', () => {
                let val = Number(customInput.value);
                if (isNaN(val)) val = 0;
                if (val !== 0) {
                    updatePlayerScore(player.id, val);
                    customInput.value = '0';
                } else {
                    alert("Masukkan nilai bukan 0 (cth: 25, -15)");
                }
            });
            customDiv.appendChild(customInput);
            customDiv.appendChild(customBtn);

            // STATISTIK KEKALAHAN (Loss Count)
            const lossCountValue = player.lossCount || 0;
            const statsDiv = document.createElement('div');
            statsDiv.className = 'stats-container';
            statsDiv.innerHTML = `
                <div class="stats-title">📉 JUMLAH KEKALAHAN (Rekor Terendah Baru)</div>
                <div class="stats-badge">😫 Kalah ${lossCountValue} kali</div>
            `;

            // REKOR TERKECIL PRIBADI
            const minRecordValue = (player.minRecord !== undefined && player.minRecord !== null) ? player.minRecord : player.score;
            const recordDiv = document.createElement('div');
            recordDiv.className = 'record-container';
            recordDiv.innerHTML = `
                <div class="record-title">🏆 REKOR TERKECIL PERNAH</div>
                <div class="record-badge">${minRecordValue}</div>
            `;

            const lastDelta = player.lastDelta !== undefined ? player.lastDelta : 0;
            let deltaDisplay = '';
            let deltaClass = 'neutral';
            if (lastDelta > 0) {
                deltaDisplay = `+${lastDelta}`;
                deltaClass = 'positive';
            } else if (lastDelta < 0) {
                deltaDisplay = `${lastDelta}`;
                deltaClass = 'negative';
            } else {
                deltaDisplay = '0 (belum ada)';
                deltaClass = 'neutral';
            }
            
            const lastChangeDiv = document.createElement('div');
            lastChangeDiv.className = 'last-change-container';
            lastChangeDiv.innerHTML = `
                <div class="last-change-title">📊 PERUBAHAN TERAKHIR</div>
                <div class="last-change-badge ${deltaClass}">${deltaDisplay}</div>
            `;

            card.appendChild(header);
            card.appendChild(scoreArea);
            card.appendChild(plusContainer);
            card.appendChild(minusContainer);
            card.appendChild(customDiv);
            card.appendChild(statsDiv);
            card.appendChild(recordDiv);
            card.appendChild(lastChangeDiv);
            container.appendChild(card);
        }

        document.querySelectorAll('.icon-btn.delete').forEach(btn => {
            btn.removeEventListener('click', window._delHandler);
            const handler = (e) => {
                const id = btn.getAttribute('data-id');
                if (id) deletePlayerById(id);
            };
            btn.addEventListener('click', handler);
            btn._delHandler = handler;
        });
        document.querySelectorAll('.icon-btn.reset').forEach(btn => {
            btn.removeEventListener('click', window._resetHandler);
            const handler = (e) => {
                const id = btn.getAttribute('data-id');
                if (id) resetPlayerScoreToZero(id);
            };
            btn.addEventListener('click', handler);
            btn._resetHandler = handler;
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function loadSamplePlayers() {
        if (players.length > 0 && !confirm("Tambah 3 pemain contoh? Data akan ditambahkan (tidak dihapus).")) return;
        const samples = ["Monkey D. Luffy", "Roronoa Zoro", "Nami"];
        let added = 0;
        for (let name of samples) {
            if (!players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                addPlayer(name, 0);
                added++;
            }
        }
        if (added === 0) alert("Nama contoh sudah ada semua!");
        else {
            renderPlayersGrid();
            renderFinalScores();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFromLocalStorage();
        renderPlayersGrid();
        renderHistoryPanel();
        renderFinalScores();

        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            const name = document.getElementById('newPlayerName').value;
            let init = parseInt(document.getElementById('initialScore').value, 10);
            if (isNaN(init)) init = 0;
            if (addPlayer(name, init)) {
                document.getElementById('newPlayerName').value = '';
                document.getElementById('initialScore').value = '0';
            }
        });
        document.getElementById('sampleBtn').addEventListener('click', loadSamplePlayers);
        document.getElementById('resetAllBtn').addEventListener('click', resetAllPlayersAndHistory);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistoryOnly);
        document.getElementById('newPlayerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addPlayerBtn').click();
        });
    });
</script>
</body>
</html>
